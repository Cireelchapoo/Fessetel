<html>
<head>
<title>Marie Astel Gaye?</title>
<style>
body {
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
background-color: #ffebee;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
overflow: hidden;
}
.card {
background: white;
padding: 3rem;
border-radius: 20px;
box-shadow: 0 10px 25px rgba(0,0,0,0.1);
text-align: center;
}
h1 { color: #d32f2f; }

.buttons {
margin-top: 20px;
position: relative;
height: 60px;
}

button {
padding: 10px 25px;
font-size: 1.2rem;
border-radius: 50px;
border: none;
cursor: pointer;
transition: transform 0.2s;
}

#yesBtn {
background-color: #ff4081;
color: white;
}

#noBtn {
background-color: #eeeeee;
position: absolute;
left: 55%;
}


.celebration {
font-size: 2rem;
margin-top: 20px;
animation: pop 0.6s ease forwards;
}

@keyframes pop {
0% { transform: scale(0); opacity: 0; }
100% { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/833/833472.png" width="100" alt="heart">
<h1>Marie Astel Gaye, will you be my WIFE?</h1>

<div class="buttons">
<button id="yesBtn">Yes</button>
<button id="noBtn">No</button>
</div>


<div id="celebrationContainer"></div>

</div>

<script>
const noBtn = document.getElementById('noBtn');
const yesBtn = document.getElementById('yesBtn');
const celebrationContainer = document.getElementById('celebrationContainer');

noBtn.addEventListener('mouseover', () => {
const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);

noBtn.style.position = 'fixed';
noBtn.style.left = x + 'px';
noBtn.style.top = y + 'px';
});


yesBtn.addEventListener('click', () => {
celebrationContainer.innerHTML = `
<div class="celebration">
🎉🥳❤️ YESSS !!! ❤️🥳🎉 <br>
💍🔥 C’est officiel maintenant 🔥💍 <br><br>

<img src="https://media.giphy.com/media/xT0GqeSlGSRQut9YQg/giphy.gif" width="200">
<img src="https://media.giphy.com/media/26tOZ42Mg6pbTUPHW/giphy.gif" width="200">

</div>
`;
});
</script>

</body>
</html>
